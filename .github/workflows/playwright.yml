name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Install Allure Command Line
      run: npm install -g allure-commandline

    - name: Run Playwright tests
      env:
        CI: true
        ENV: ${{ github.event.inputs.environment || 'qa' }}
      run: npx playwright test --project="Desktop ${{ matrix.browser }}" --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}-${{ matrix.shardIndex }}
        path: |
          reports/
          test-results/
          allure-results/
        retention-days: 30

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}-${{ matrix.shardIndex }}
        path: allure-results
        retention-days: 30

  report:
    name: Generate Allure Report
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Download all Allure results
      uses: actions/download-artifact@v4
      with:
        path: allure-results-combined

    - name: Merge Allure results
      run: |
        mkdir -p allure-results
        find allure-results-combined -type f -name "*.json" -exec cp {} allure-results/ \;
        find allure-results-combined -type f -name "*.txt" -exec cp {} allure-results/ \;

    - name: Install Allure Command Line
      run: npm install -g allure-commandline

    - name: Generate Allure Report
      run: allure generate allure-results --clean -o allure-report

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
        retention-days: 30

    - name: Deploy Allure Report to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: allure-report

    - name: Comment PR with Allure Report link
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '## Test Results\n\nAllure report has been generated. Download it from the artifacts section.'
          })

  notify:
    name: Send Notifications
    needs: [test, report]
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.test.result }}" == "failure" ]; then
          echo "Tests failed!"
          exit 1
        else
          echo "Tests passed!"
        fi
